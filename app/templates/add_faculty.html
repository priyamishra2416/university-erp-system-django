{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Add Faculty</title>

    <link rel="stylesheet"
          href="{% static 'css/auth.css' %}">
</head>
<body>

{% if messages %}

<div class="messages">

    {% for message in messages %}

    <div class="message {{ message.tags }}">{{ message }}</div>

    {% endfor %}

</div>

{% endif %}

<div class="container">

    <div class="left">

        <h1>Add Faculty</h1>

        <p>
            Manage university faculty,
            departments and subjects.
        </p>

    </div>

    <div class="right">

        <h2>Faculty Form</h2>

        <p><a href="{% url 'faculty' %}">Back to Faculty</a></p>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="name"
                     placeholder="Faculty Name"
                     required>

            <input type="email"
                   name="email"
                     placeholder="Faculty Email"
                     required>

            <input type="text"
                   name="department"
                     placeholder="Department"
                     required>

            <input type="text"
                   name="subject"
                     placeholder="Subject"
                     required>

            <button type="submit">
                Add Faculty
            </button>

        </form>

    </div>

</div>

</body>
</html>
