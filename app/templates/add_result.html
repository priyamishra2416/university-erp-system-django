{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Result</title>

    <link rel="stylesheet"
          href="{% static 'css/auth.css' %}">

</head>
<body>

{% if messages %}

<div class="messages">

    {% for message in messages %}

    <div class="message {{ message.tags }}">{{ message }}</div>

    {% endfor %}

</div>

{% endif %}

<div class="container">

    <!-- LEFT -->

    <div class="left">

        <h1>
            Add Student Result
        </h1>

        <p>
            Manage marks, subjects and CGPA
            with Smart UniERP.
        </p>

    </div>

    <!-- RIGHT -->

    <div class="right">

        <h2>
            Result Form
        </h2>

        <p><a href="{% url 'results' %}">Back to Results</a></p>

        <form method="POST">

            {% csrf_token %}

            <!-- STUDENT -->

            <select name="student" required>

                <option value="">
                    Select Student
                </option>

                {% for i in students %}

                <option value="{{ i.id }}">

                    {{ i.name }}

                </option>

                {% endfor %}

            </select>

            <!-- SUBJECT -->

            <input type="text"
                   name="subject"
                   placeholder="Subject"
                   required>

            <!-- MARKS -->

            <input type="number"
                   name="marks"
                   placeholder="Marks"
                   required>

            <!-- CGPA -->

            <input type="text"
                   name="cgpa"
                   placeholder="CGPA"
                   required>

            <!-- BUTTON -->

            <button type="submit">

                Add Result

            </button>

        </form>

    </div>

</div>

</body>
</html>
